name: "CodeQL Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '15 10 * * 1' # Runs weekly

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java-kotlin' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        build-mode: 'none'

    # The harnesses track the starter's unreleased SNAPSHOT, which is not published to
    # Maven Central — build and install it from source first. Remove this step (and pin
    # a released starter version in the harness poms) once 1.0.0-RC2 is on Central.
    - name: Build expo-push SNAPSHOT dependency
      run: |
        git clone --depth 1 https://github.com/expopush/expo-push.git ../expo-push
        mvn -B -f ../expo-push/pom.xml install -DskipTests

    - name: Build for CodeQL
      run: mvn -B clean compile -DskipTests

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
