name: Java CI (Test Harnesses)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to upload dependency graph snapshots
    steps:
    - uses: actions/checkout@v7

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # The harnesses track the starter's unreleased SNAPSHOT, which is not published to
    # Maven Central — build and install it from source first. Remove this step (and pin
    # a released starter version in the harness poms) once 1.0.0-RC2 is on Central.
    - name: Build expo-push SNAPSHOT dependency
      run: |
        git clone --depth 1 https://github.com/expopush/expo-push.git ../expo-push
        mvn -B -f ../expo-push/pom.xml install -DskipTests

    - name: Build with Maven
      run: mvn -B clean verify

    - name: Update Dependency Graph
      uses: advanced-security/maven-dependency-submission-action@v5
